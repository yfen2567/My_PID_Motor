<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .title{font:700 26px Arial,"Microsoft YaHei",sans-serif;fill:#111827}
      .lane{font:600 15px Arial,"Microsoft YaHei",sans-serif;fill:#475467}
      .box{fill:#ffffff;stroke:#344054;stroke-width:1.6;rx:8;ry:8}
      .core{fill:#eef6ff;stroke:#175cd3;stroke-width:2;rx:8;ry:8}
      .sub{fill:#f8fafc;stroke:#667085;stroke-width:1.4;rx:8;ry:8}
      .fault{fill:#fff4ed;stroke:#d92d20;stroke-width:1.6;rx:8;ry:8}
      .hw{fill:#f0fdf4;stroke:#039855;stroke-width:1.6;rx:8;ry:8}
      .text{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#101828}
      .small{font:12px Arial,"Microsoft YaHei",sans-serif;fill:#475467}
      .line{stroke:#344054;stroke-width:1.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#667085;stroke-width:1.4;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="48" class="title">My_PID_Motor 系统结构图</text>
  <text x="40" y="76" class="lane">根据当前源码关系整理：Control.c 是周期控制中心，UART 只通过 Control 接口修改状态。</text>

  <rect x="70" y="120" width="190" height="68" class="hw"/>
  <text x="165" y="148" text-anchor="middle" class="text">ADC1_IN3 + DMA</text>
  <text x="165" y="170" text-anchor="middle" class="small">电位器目标输入</text>

  <rect x="70" y="235" width="190" height="72" class="hw"/>
  <text x="165" y="264" text-anchor="middle" class="text">Encoder A/B</text>
  <text x="165" y="286" text-anchor="middle" class="small">TIM2 PA15 / PB3</text>

  <rect x="70" y="390" width="190" height="72" class="hw"/>
  <text x="165" y="418" text-anchor="middle" class="text">USART1</text>
  <text x="165" y="440" text-anchor="middle" class="small">PA9 TX / PA10 RX</text>

  <rect x="325" y="115" width="200" height="82" class="sub"/>
  <text x="425" y="143" text-anchor="middle" class="text">ADC_Sensor.c</text>
  <text x="425" y="165" text-anchor="middle" class="small">ADC_Update()</text>
  <text x="425" y="184" text-anchor="middle" class="small">Filter / MapTargetSpeed</text>

  <rect x="325" y="232" width="200" height="78" class="sub"/>
  <text x="425" y="260" text-anchor="middle" class="text">Encoder.c</text>
  <text x="425" y="282" text-anchor="middle" class="small">Encoder_Getspeed()</text>
  <text x="425" y="301" text-anchor="middle" class="small">GetLastDelta()</text>

  <rect x="325" y="386" width="200" height="82" class="sub"/>
  <text x="425" y="414" text-anchor="middle" class="text">Uart.c</text>
  <text x="425" y="436" text-anchor="middle" class="small">RxCpltCallback()</text>
  <text x="425" y="455" text-anchor="middle" class="small">Uart_Task / HandleCmd</text>

  <rect x="600" y="180" width="250" height="170" class="core"/>
  <text x="725" y="212" text-anchor="middle" class="text">Control.c</text>
  <text x="725" y="237" text-anchor="middle" class="small">Control_Tick10ms()</text>
  <text x="725" y="257" text-anchor="middle" class="small">Control_Update()</text>
  <text x="725" y="277" text-anchor="middle" class="small">s_motor_status / s_pid</text>
  <text x="725" y="297" text-anchor="middle" class="small">target / actual / PWM / fault</text>
  <text x="725" y="317" text-anchor="middle" class="small">目标源 / 启动助推 / 状态快照</text>

  <rect x="600" y="395" width="250" height="86" class="sub"/>
  <text x="725" y="426" text-anchor="middle" class="text">PID.c</text>
  <text x="725" y="448" text-anchor="middle" class="small">PID_Update()</text>
  <text x="725" y="467" text-anchor="middle" class="small">PID_Reset / PID_SetGains</text>

  <rect x="600" y="530" width="250" height="82" class="fault"/>
  <text x="725" y="558" text-anchor="middle" class="text">Control_CheckFault()</text>
  <text x="725" y="580" text-anchor="middle" class="small">Speed Over Limit</text>
  <text x="725" y="599" text-anchor="middle" class="small">Encoder Lost / PWM Saturation</text>

  <rect x="925" y="185" width="205" height="88" class="sub"/>
  <text x="1028" y="217" text-anchor="middle" class="text">Motor.c</text>
  <text x="1028" y="240" text-anchor="middle" class="small">Motor_SetPWM()</text>
  <text x="1028" y="259" text-anchor="middle" class="small">Motor_Stop()</text>

  <rect x="925" y="325" width="205" height="84" class="hw"/>
  <text x="1028" y="355" text-anchor="middle" class="text">TIM1_CH1 PWM</text>
  <text x="1028" y="377" text-anchor="middle" class="small">PA8 + PA1/PA2</text>
  <text x="1028" y="396" text-anchor="middle" class="small">H 桥驱动电机</text>

  <rect x="925" y="465" width="205" height="74" class="hw"/>
  <text x="1028" y="494" text-anchor="middle" class="text">GA12-N20 电机</text>
  <text x="1028" y="516" text-anchor="middle" class="small">带 AB 相编码器</text>

  <line x1="260" y1="154" x2="325" y2="154" class="line"/>
  <line x1="525" y1="156" x2="600" y2="222" class="line"/>
  <line x1="260" y1="271" x2="325" y2="271" class="line"/>
  <line x1="525" y1="271" x2="600" y2="271" class="line"/>
  <line x1="260" y1="426" x2="325" y2="426" class="line"/>
  <line x1="525" y1="426" x2="600" y2="315" class="line"/>

  <line x1="725" y1="395" x2="725" y2="350" class="line"/>
  <line x1="850" y1="252" x2="925" y2="229" class="line"/>
  <line x1="1028" y1="273" x2="1028" y2="325" class="line"/>
  <line x1="1028" y1="409" x2="1028" y2="465" class="line"/>

  <path d="M 925 502 C 760 690, 280 650, 165 307" class="dash"/>
  <line x1="725" y1="350" x2="725" y2="530" class="line"/>
  <path d="M 850 571 C 905 545, 930 500, 950 273" class="dash"/>

  <path d="M 850 315 C 900 455, 905 600, 850 612" class="dash"/>
  <text x="875" y="622" class="small">fault 时 Motor_Stop + PID_Reset</text>

  <path d="M 600 335 C 520 520, 505 575, 600 572" class="dash"/>
  <text x="365" y="555" class="small">status / 3s 自动上报</text>
</svg>
